<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
</head>
<body>
    <h1>Add Product</h1>

    <nav>
        <a th:href="@{/}">Home</a> |
        <a th:href="@{/products}">Products</a>
    </nav>

    <form th:action="@{/products/add}" th:object="${product}" method="post">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" th:field="*{name}" required>
        </div>

        <div>
            <label for="brand">Brand:</label>
            <input type="text" id="brand" th:field="*{brand}" required>
        </div>

        <div>
            <label for="category">Category:</label>
            <input type="text" id="category" th:field="*{category}" required>
        </div>

        <div>
            <label for="price">Price:</label>
            <input type="number" id="price" step="0.01" th:field="*{price}" required>
        </div>

        <div>
            <label for="stock">Stock:</label>
            <input type="number" id="stock" th:field="*{stock}" required>
        </div>

        <div>
            <button type="submit">Add Product</button>
        </div>
    </form>
</body>
</html>
