<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ApexTech - Register</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container py-5">
    <div class="card auth-card mx-auto">
        <div class="card-body p-4 p-md-5">
            <h2 class="mb-2">Create Account</h2>
            <p class="text-muted mb-4">Register to start using ApexTech.</p>

            <form th:action="@{/register}" th:object="${registrationForm}" method="post" class="d-grid gap-3" novalidate>
                <div>
                    <label for="username" class="form-label">Username</label>
                    <input id="username" th:field="*{username}" type="text" class="form-control" autocomplete="username" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>

                <div>
                    <label for="password" class="form-label">Password</label>
                    <input id="password" th:field="*{password}" type="password" class="form-control" autocomplete="new-password" required>
                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <button type="submit" class="btn btn-primary">Register</button>
                <a th:href="@{/login}" class="btn btn-outline-primary">Back to login</a>
            </form>
        </div>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
