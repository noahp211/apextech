<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>ApexTech</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
    <nav th:replace="fragments/navbar :: navbar"></nav>

    <div class="hero">
        <h1>Welcome to ApexTech</h1>
        <p>A simple technology marketplace to browse, search, and manage electronics, including laptops, phones, tablets, and accessories.</p>
        <a class="btn btn-primary btn-lg" th:href="@{/products}">Browse Products</a>
        <a class="btn btn-outline-light btn-lg ms-2" th:href="@{/products/add}" sec:authorize="hasAnyRole('ADMIN', 'STAFF')">Add a Product</a>
    </div>

    <div class="container mb-5">

        <h5 class="home-section-title">View Categories</h5>
        <div class="row g-3 mb-2">
            <div class="col-6 col-md-3">
                <a th:href="@{/products(category=Laptop)}" class="home-category-card">
                    <div class="home-category-icon">&#128187;</div>
                    <div>Laptops</div>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a th:href="@{/products(category=Phone)}" class="home-category-card">
                    <div class="home-category-icon">&#128241;</div>
                    <div>Phones</div>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a th:href="@{/products(category=Tablet)}" class="home-category-card">
                    <div class="home-category-icon">&#128223;</div>
                    <div>Tablets</div>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a th:href="@{/products(category=Accessory)}" class="home-category-card">
                    <div class="home-category-icon">&#127911;</div>
                    <div>Accessories</div>
                </a>
            </div>
        </div>

    </div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
