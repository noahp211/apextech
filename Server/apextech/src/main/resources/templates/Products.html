<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products - ApexTech</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
    <nav th:replace="fragments/navbar :: navbar"></nav>
<div class="container py-4">

    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="card-title mb-4">Product Catalog</h1>

            <form th:action="@{/products}" method="get" class="row g-3 mb-4">
                <div class="col-md-3">
                    <label for="keyword" class="form-label">Search by Name</label>
                    <input type="text" id="keyword" name="keyword" th:value="${keyword}" class="form-control" placeholder="Search products">
                </div>

                <div class="col-md-2">
                    <label for="brand" class="form-label">Brand</label>
                    <select id="brand" name="brand" class="form-select">
                        <option value="">All Brands</option>
                        <option th:each="b : ${brands}"
                                th:value="${b}"
                                th:text="${b}"
                                th:selected="${brand == b}"></option>
                    </select>
                </div>

                <div class="col-md-2">
                    <label for="category" class="form-label">Category</label>
                    <select id="category" name="category" class="form-select">
                        <option value="">All Categories</option>
                        <option th:each="c : ${categories}"
                                th:value="${c}"
                                th:text="${c}"
                                th:selected="${category == c}"></option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label for="sortBy" class="form-label">Sort By</label>
                    <select id="sortBy" name="sortBy" class="form-select">
                        <option value="nameAsc" th:selected="${sortBy == 'nameAsc'}">Name (A-Z)</option>
                        <option value="nameDesc" th:selected="${sortBy == 'nameDesc'}">Name (Z-A)</option>
                        <option value="priceAsc" th:selected="${sortBy == 'priceAsc'}">Price (Low to High)</option>
                        <option value="priceDesc" th:selected="${sortBy == 'priceDesc'}">Price (High to Low)</option>
                        <option value="stockAsc" th:selected="${sortBy == 'stockAsc'}">Stock (Low to High)</option>
                        <option value="stockDesc" th:selected="${sortBy == 'stockDesc'}">Stock (High to Low)</option>
                    </select>
                </div>

                <div class="col-md-2 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary">Apply</button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary">Reset</a>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-bordered table-striped align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Brand</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Created At</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="7" class="text-center">No products found.</td>
                    </tr>
                    <tr th:each="product : ${products}">
                        <td th:text="${product.id}"></td>
                        <td th:text="${product.name}"></td>
                        <td th:text="${product.brand}"></td>
                        <td th:text="${product.category}"></td>
                        <td th:text="${'$' + #numbers.formatDecimal(product.price, 1, 2)}"></td>
                        <td th:text="${product.stock}"></td>
                        <td th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3" th:if="${productPage.totalPages > 0}">
                <div>
                    <span class="text-muted">
                        Page <span th:text="${productPage.number + 1}"></span> of
                        <span th:text="${productPage.totalPages}"></span>
                    </span>
                </div>

                <div class="d-flex gap-2">
                    <a class="btn btn-outline-primary btn-sm"
                       th:if="${productPage.hasPrevious()}"
                       th:href="@{/products(page=${productPage.number - 1}, size=${productPage.size}, keyword=${keyword}, brand=${brand}, category=${category}, sortBy=${sortBy})}">
                        Previous
                    </a>

                    <a class="btn btn-outline-primary btn-sm"
                       th:if="${productPage.hasNext()}"
                       th:href="@{/products(page=${productPage.number + 1}, size=${productPage.size}, keyword=${keyword}, brand=${brand}, category=${category}, sortBy=${sortBy})}">
                        Next
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
