<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ApexTech - Login</title>
    <div th:insert="fragments/base :: assetsHead"></div>
</head>
<body>
<nav th:replace="fragments/navbar :: navbar"></nav>

<div class="container py-5">
    <div class="card auth-card mx-auto">
        <div class="card-body p-4 p-md-5">
            <h2 class="mb-2">Login</h2>
            <p class="text-muted mb-4">Welcome back to ApexTech.</p>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                Incorrect username or password. Please try again.
            </div>

            <div th:if="${param.registered}" class="alert alert-success" role="alert">
                Registration successful. You can now log in.
            </div>

            <div th:if="${param.logout}" class="alert alert-info" role="alert">
                You have been logged out.
            </div>

            <form th:action="@{/login}" method="post" class="d-grid gap-3">
                <div>
                    <label for="username" class="form-label">Username</label>
                    <input id="username" name="username" type="text" class="form-control" autocomplete="username" required>
                </div>

                <div>
                    <label for="password" class="form-label">Password</label>
                    <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary">Login</button>
                <a th:href="@{/register}" class="btn btn-outline-primary">Create an account</a>
            </form>
        </div>
    </div>
</div>

<div th:insert="fragments/base :: assetsScripts"></div>
</body>
</html>
